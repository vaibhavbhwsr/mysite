{% extends 'post/home.html' %}
{% load static %}
{% block title %} Groups {% endblock %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
            <div class="card my-5">
                <div class="card-body text-center">
                    <h5 class="card-title text-center"><b>Users Available</b></h5>
                    <hr>
                    <div class="d-grid gap-2 col-9 mx-auto add-new-group">
                        {% for user in user_list %}
                        <a class="btn btn-primary btn-lg" href="#"><h5>{{ user.username }}<span class="float-end">{% include "others/on_off.html" %}<span></h5></a>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
